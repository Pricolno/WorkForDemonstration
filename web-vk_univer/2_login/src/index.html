<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <title>Login</title>
    
</head>
<body>
    <div class="window-wrapper">
        <div class="img-left">
        </div>
        <div class="login">
            <div class="content-wrapper">
                <p class="welcome">
                    Welcome back
                </p>
                <h1 class="title">
                    Login to your account
                </h1>

                <form class="form" target="_blank">
                    <div class="description-by-text">
                        <label class="label" for="password">Password</label>
                    </div>
                    <div class="input-row">
                        <input type="password" id="password" class="input" placeholder="Password">
                    </div>
                
                    <div class="description-by-text">
                        <label class="label" for="email">Password</label>
                    </div>
                    <div class="input-row input-last-row"> 
                        <input type="email" id="email" class="input" placeholder="Email">
                    </div>

                    <div class="remember-password">
                        <div>
                            <input type="checkbox" name="remember" class="remember-link">
                            <label for="remember-link">Remember me</label>
                        </div>
                        <div>
                            <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" class="forgot-link">Forgot password?</a>
                        </div>
                    </div>

                    <div class="button-login-wrapper">
                        <button onclick="window.open('https\:\/\/www.youtube.com\/watch?v=dQw4w9WgXcQ')" class="button-login">
                            Login now 
                        </button>
                        <button onclick="window.open('https\:\/\/www.youtube.com\/watch?v=dQw4w9WgXcQ')" class="button-login google">
                            <img src="./images/google_icon.png">
                            Or sign-in with google
                        </button>
                    </div>
                </form>


                <div class="footer">
                    <div class="footer-text">
                        Dont have an account?
                    </div>
                    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" class="join-us-link">
                        Join free today
                    </a>
                </div>
            </div>  
        </div>
    </div>
</body>
</html>
